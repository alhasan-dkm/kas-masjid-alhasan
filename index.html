<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kas Masjid Al-Hasan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1e3a8a; /* Blue Dark */
            --success-color: #10b981; /* Green */
            --danger-color: #ef4444; /* Red */
            --warning-color: #f59e0b; /* Orange/Gold */
            --bg-body: #f8fafc;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* HEADER SECTION */
        .header {
            display: flex;
            align-items: center;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border-left: 8px solid var(--primary-color);
        }

        .header img {
            margin-right: 20px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            color: var(--primary-color);
            font-weight: 700;
        }

        .header p {
            margin: 5px 0 0;
            color: #64748b;
            font-size: 14px;
        }

        /* FORM SECTION */
        .form-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-save { background: var(--primary-color); color: white; }
        .btn-save:hover { background: #1e40af; transform: translateY(-1px); }

        .btn-print { background: #64748b; color: white; }
        .btn-login { background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; }

        /* DASHBOARD CARDS */
        #dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .card h3 {
            font-size: 14px;
            margin: 0;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 22px;
            font-weight: 700;
            margin: 10px 0 0;
        }

        .pemasukan { border-bottom: 4px solid var(--success-color); }
        .pemasukan p { color: var(--success-color); }

        .pengeluaran { border-bottom: 4px solid var(--danger-color); }
        .pengeluaran p { color: var(--danger-color); }

        .saldo { border-bottom: 4px solid var(--warning-color); }
        .saldo p { color: var(--warning-color); }

        /* TABLE SECTION */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            color: #64748b;
            border-bottom: 2px solid #edf2f7;
        }

        td {
            padding: 15px;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover { background-color: #fdfdfd; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-masuk { background: #dcfce7; color: #166534; }
        .badge-keluar { background: #fee2e2; color: #991b1b; }

        /* LOADING SPINNER */
        #loader {
            display: none;
            margin-left: 10px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 15px;
            height: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            #dashboard { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .header img { margin-bottom: 15px; margin-right: 0; }
        }

        /* PRINT SETTINGS */
        @media print {
            .form-card, .button-group, #labelFilter, #filterJenis, .kolom-aksi, .btn-login {
                display: none !important;
            }
            body { background: white; padding: 0; }
            .container { max-width: 100%; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header">
        <img src="logoalhasan.png" width="80" alt="Logo">
        <div>
            <h1>Masjid Al-Hasan</h1>
            <p>Sistem Informasi Laporan Keuangan Digital</p>
        </div>
    </div>

    <div class="form-card">
        <div class="grid-form">
            <div>
                <label>Tanggal</label>
                <input type="date" id="tanggal">
            </div>
            <div>
                <label>Jumlah (Rp)</label>
                <input type="number" id="jumlah" placeholder="0">
            </div>
            <div>
                <label>Jenis Transaksi</label>
                <select id="jenis">
                    <option>Pemasukan</option>
                    <option>Pengeluaran</option>
                    <option>Donasi Khusus</option>
                </select>
            </div>
            <div>
                <label>Keterangan</label>
                <input type="text" id="keterangan" placeholder="Contoh: Infaq Jumat">
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-save" onclick="simpanData()">
                Simpan Transaksi <div id="loader"></div>
            </button>
            <button class="btn-print" onclick="window.print()">Cetak Laporan</button>
            <button class="btn-login" id="btnLogin" onclick="loginAdmin()">Login Admin</button>
        </div>
    </div>

    <div id="areaLaporan">
        <div id="dashboard">
            <div class="card pemasukan">
                <h3>Total Pemasukan</h3>
                <p id="totalPemasukan">Rp 0</p>
            </div>
            <div class="card pengeluaran">
                <h3>Total Pengeluaran</h3>
                <p id="totalPengeluaran">Rp 0</p>
            </div>
            <div class="card saldo">
                <h3>Saldo Akhir</h3>
                <p id="saldo">Rp 0</p>
            </div>
        </div>

        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h2 style="margin:0; font-size: 18px;">Riwayat Transaksi</h2>
                <div>
                    <select id="filterJenis" onchange="refreshTabel()" style="width: 180px; padding: 8px;">
                        <option value="Semua">Semua Transaksi</option>
                        <option value="Pemasukan">Pemasukan</option>
                        <option value="Pengeluaran">Pengeluaran</option>
                        <option value="Donasi Khusus">Donasi Khusus</option>
                    </select>
                </div>
            </div>

            <table id="tabelTransaksi">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Keterangan</th>
                        <th>Jenis</th>
                        <th>Jumlah</th>
                        <th class="kolom-aksi">Aksi</th>
                    </tr>
                </thead>
                <tbody id="bodyTabel">
                    </tbody>
            </table>
        </div>
    </div>

    <footer style="text-align: center; margin-top: 40px; color: #94a3b8; font-size: 13px; padding-bottom: 20px;">
        <p>© <span id="tahun"></span> Masjid Al-Hasan | Dikembangkan untuk transparansi umat</p>
    </footer>
</div>

<script>
    // Konfigurasi Anda tetap sama
    let semuaTransaksi = [];
    let modeAdmin = false;
    let passwordAdmin = "bendaharaalhasan";
    const API_URL = "https://script.google.com/macros/s/AKfycbyM8nYdVEvPUnEbd0hnlrMU4FCG3Xi9gajZkL1I8PuwqQUuIwHrP1BnB1YDBrStlEzu/exec";

    function formatRupiah(angka) {
        return "Rp " + Number(angka).toLocaleString("id-ID");
    }

    function toggleLoader(show) {
        document.getElementById("loader").style.display = show ? "inline-block" : "none";
    }

    function loginAdmin() {
        let inputPassword = prompt("Masukkan password admin:");
        if (inputPassword === passwordAdmin) {
            modeAdmin = true;
            document.getElementById("btnLogin").innerHTML = "Admin Active ✅";
            document.getElementById("btnLogin").style.borderColor = "var(--success-color)";
            refreshTabel();
        } else {
            alert("Password salah!");
        }
    }

    function simpanData() {
        if (!modeAdmin) return alert("Silahkan login admin terlebih dahulu.");
        
        let tanggal = document.getElementById("tanggal").value;
        let jumlah = document.getElementById("jumlah").value;
        let jenis = document.getElementById("jenis").value;
        let keterangan = document.getElementById("keterangan").value;

        if (!tanggal || !jumlah) return alert("Mohon lengkapi tanggal dan jumlah.");

        toggleLoader(true);
        
        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ tanggal, jumlah, jenis, keterangan })
        })
        .then(() => {
            loadDataDariSheet();
            // Reset Form
            document.getElementById("jumlah").value = "";
            document.getElementById("keterangan").value = "";
        })
        .finally(() => toggleLoader(false));
    }

    function refreshTabel() {
        const body = document.getElementById("bodyTabel");
        const filter = document.getElementById("filterJenis").value;
        
        semuaTransaksi.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal)); // Terbaru di atas

        body.innerHTML = "";

        semuaTransaksi.forEach((item, index) => {
            if (filter !== "Semua" && item.jenis !== filter) return;

            let row = body.insertRow();
            let isKeluar = item.jenis === "Pengeluaran";
            
            row.insertCell(0).innerHTML = `<span style="color:#64748b">${item.tanggal}</span>`;
            row.insertCell(1).innerHTML = `<strong>${item.keterangan || '-'}</strong>`;
            row.insertCell(2).innerHTML = `<span class="badge ${isKeluar ? 'badge-keluar' : 'badge-masuk'}">${item.jenis}</span>`;
            row.insertCell(3).innerHTML = `<span style="font-weight:600; color:${isKeluar ? 'var(--danger-color)' : 'var(--success-color)'}">${formatRupiah(item.jumlah)}</span>`;
            
            let aksi = row.insertCell(4);
            aksi.className = "kolom-aksi";
            if (modeAdmin) {
                aksi.innerHTML = `<button onclick="hapusData(${index})" style="background:none; color:red; padding:5px;">✕</button>`;
            }
        });
    }

    function hapusData(index) {
        if (!confirm("Hapus data ini?")) return;
        
        let rowSheet = semuaTransaksi[index].row;
        toggleLoader(true);

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ mode: "delete", row: rowSheet })
        })
        .then(() => loadDataDariSheet())
        .finally(() => toggleLoader(false));
    }

    function hitungSaldo() {
        let tMasuk = 0, tKeluar = 0;
        semuaTransaksi.forEach(t => {
            let nominal = Number(t.jumlah);
            if (t.jenis === "Pengeluaran") tKeluar += nominal;
            else tMasuk += nominal;
        });

        document.getElementById("totalPemasukan").innerHTML = formatRupiah(tMasuk);
        document.getElementById("totalPengeluaran").innerHTML = formatRupiah(tKeluar);
        document.getElementById("saldo").innerHTML = formatRupiah(tMasuk - tKeluar);
    }

    function loadDataDariSheet() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                semuaTransaksi = data;
                refreshTabel();
                hitungSaldo();
            });
    }

    window.onload = () => {
        loadDataDariSheet();
        document.getElementById("tahun").innerText = new Date().getFullYear();
    };
</script>

</body>
</html>
